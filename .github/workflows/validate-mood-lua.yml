# .github/workflows/validate-mood-lua.yml
# Horror.Place CI: Validate Mood Lua Modules
# Runs mood_lint.lua against registry/moods.json to ensure all registered
# mood modules export required hooks and follow naming conventions.

name: Validate Mood Lua Modules

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'moods/**.lua'
      - 'registry/moods.json'
      - 'scripts/mood_lint.lua'
      - 'engine/library/horror_invariants.lua'
      - 'engine/library/horror_audio.lua'
  pull_request:
    branches: [ main ]
    paths:
      - 'moods/**.lua'
      - 'registry/moods.json'
      - 'scripts/mood_lint.lua'
      - 'engine/library/horror_invariants.lua'
      - 'engine/library/horror_audio.lua'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'false'
        type: boolean

env:
  LUA_VERSION: "5.4"
  LUAROCKS_VERSION: "3.11.0"

jobs:
  lint-mood-lua:
    name: Lint Mood Lua Modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # For diff-based optimizations if needed
      
      - name: Set up Lua ${{ env.LUA_VERSION }}
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: ${{ env.LUA_VERSION }}
      
      - name: Set up LuaRocks ${{ env.LUAROCKS_VERSION }}
        uses: leafo/gh-actions-luarocks@v5
        with:
          luarocksVersion: ${{ env.LUAROCKS_VERSION }}
      
      - name: Install dependencies
        run: |
          luarocks install dkjson 2.8.0-1
          luarocks install argparse 0.7.1-1
          # Optional: Install luacheck for additional static analysis
          luarocks install luacheck 1.1.0-1 || true
      
      - name: Run mood linter
        run: |
          lua scripts/mood_lint.lua registry/moods.json \
            ${{ github.event.inputs.verbose == 'true' && '--verbose' || '' }}
        env:
          LUA_PATH: "./?.lua;./?/init.lua;;"
      
      - name: Upload lint report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mood-lint-report-${{ github.run_number }}
          path: |
            registry/moods.json
            scripts/mood_lint.lua
          retention-days: 7
      
      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const runId = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            
            let body = `### Mood Lua Validation\n\n`;
            body += status === 'success' 
              ? '✅ All mood modules passed validation.\n' 
              : `❌ Validation failed. [View workflow run #${runId}](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId})\n`;
            body += `\n*Automatically generated by validate-mood-lua.yml*`;
            
            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

  # Optional: Parallel job for luacheck static analysis
  static-analysis:
    name: Static Analysis (luacheck)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint-mood-lua
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: ${{ env.LUA_VERSION }}
      
      - uses: leafo/gh-actions-luarocks@v5
        with:
          luarocksVersion: ${{ env.LUAROCKS_VERSION }}
      
      - name: Install luacheck
        run: luarocks install luacheck 1.1.0-1
      
      - name: Run luacheck on mood modules
        run: |
          luacheck moods/*.lua --codes \
            --globals require,assert,error,print,table,string,io,os,debug \
            --std min+luajit \
            --no-color \
            || echo "luacheck found issues (non-blocking)"
