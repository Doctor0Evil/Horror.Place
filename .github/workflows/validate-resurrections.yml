name: Validate Resurrection Modules

on:
  pull_request:
    paths:
      - "registry/resurrections.json"
      - "moods/**Resurrection*.lua"
      - "engine/library/horrorresurrection.lua"
      - "scripts/resurrectionlint.lua"
  push:
    paths:
      - "registry/resurrections.json"
      - "moods/**Resurrection*.lua"
      - "engine/library/horrorresurrection.lua"
      - "scripts/resurrectionlint.lua"

jobs:
  resurrection-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Install LuaRocks and dkjson
        uses: leafo/gh-actions-luarocks@v4
      - run: luarocks install dkjson

      - name: Run resurrection linter
        run: lua scripts/resurrectionlint.lua registry/resurrections.json
